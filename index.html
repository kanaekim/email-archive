<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Archive</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f4f0;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 3rem 1.5rem;
  }
  .container { max-width: 700px; margin: 0 auto; }
  header { margin-bottom: 2.5rem; }
  header h1 { font-size: 22px; font-weight: 500; margin-bottom: 6px; }
  header p { font-size: 14px; color: #888; }

  .group { margin-bottom: 2rem; }
  .group-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #aaa;
    margin-bottom: 8px;
    padding-left: 2px;
  }
  .list { display: flex; flex-direction: column; gap: 6px; }

  .email-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fff;
    border: 0.5px solid rgba(0,0,0,0.1);
    border-radius: 10px;
    padding: 0.85rem 1.1rem;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.12s, background 0.12s;
  }
  .email-card:hover { border-color: rgba(0,0,0,0.22); background: #fafaf9; }
  .email-card:hover .arrow { opacity: 1; }

  .card-left { display: flex; align-items: center; gap: 12px; }
  .badge {
    width: 28px; height: 28px;
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; flex-shrink: 0;
  }
  .badge-purple { background: #eeedfe; color: #534ab7; }
  .badge-teal   { background: #e1f5ee; color: #0f6e56; }
  .badge-amber  { background: #faeeda; color: #854f0b; }
  .badge-coral  { background: #faece7; color: #993c1d; }

  .email-name { font-size: 14px; font-weight: 500; }
  .email-file { font-size: 11px; color: #bbb; margin-top: 1px; font-family: 'SF Mono', monospace; }

  .arrow { opacity: 0.2; transition: opacity 0.12s; font-size: 15px; color: #666; }

  footer { margin-top: 2.5rem; font-size: 12px; color: #ccc; text-align: center; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Email archive</h1>
    <p id="count">Loading…</p>
  </header>

  <div class="group">
    <div class="group-label">ACRM MCP NonFAQ</div>
    <div class="list" id="group-acrm"></div>
  </div>

  <div class="group">
    <div class="group-label">Pivotal MCP NonFAQ</div>
    <div class="list" id="group-pivotal"></div>
  </div>

  <div class="group">
    <div class="group-label">Saratoga upgrade</div>
    <div class="list" id="group-saratoga"></div>
  </div>

  <div class="group">
    <div class="group-label">Tivian DXI dashboard</div>
    <div class="list" id="group-tivian"></div>
  </div>

  <footer>kanaekim / email-archive</footer>
</div>

<script>
const emails = [
  { group: "acrm",     badge: "AC", color: "purple", label: "ACRM MCP NonFAQ",     file: "ACRM_MCP_NonFAQ.html",         num: 1 },
  { group: "acrm",     badge: "AC", color: "purple", label: "ACRM MCP NonFAQ",     file: "ACRM_MCP_NonFAQ_2.html",       num: 2 },
  { group: "acrm",     badge: "AC", color: "purple", label: "ACRM MCP NonFAQ",     file: "ACRM_MCP_NonFAQ_3.html",       num: 3 },
  { group: "acrm",     badge: "AC", color: "purple", label: "ACRM MCP NonFAQ",     file: "ACRM_MCP_NonFAQ_4.html",       num: 4 },
  { group: "pivotal",  badge: "PV", color: "teal",   label: "Pivotal MCP NonFAQ",  file: "Pivotal_MCP_NonFAQ.html",      num: 1 },
  { group: "pivotal",  badge: "PV", color: "teal",   label: "Pivotal MCP NonFAQ",  file: "Pivotal_MCP_NonFAQ_2.html",    num: 2 },
  { group: "pivotal",  badge: "PV", color: "teal",   label: "Pivotal MCP NonFAQ",  file: "Pivotal_MCP_NonFAQ_3.html",    num: 3 },
  { group: "pivotal",  badge: "PV", color: "teal",   label: "Pivotal MCP NonFAQ",  file: "Pivotal_MCP_NonFAQ_4.html",    num: 4 },
  { group: "saratoga", badge: "SA", color: "amber",  label: "Saratoga upgrade",    file: "Saratoga upgrade_1.html",      num: 1 },
  { group: "saratoga", badge: "SA", color: "amber",  label: "Saratoga upgrade",    file: "Saratoga upgrade_2.html",      num: 2 },
  { group: "saratoga", badge: "SA", color: "amber",  label: "Saratoga upgrade",    file: "Saratoga upgrade_3.html",      num: 3 },
  { group: "saratoga", badge: "SA", color: "amber",  label: "Saratoga upgrade",    file: "Saratoga upgrade_4.html",      num: 4 },
  { group: "saratoga", badge: "SA", color: "amber",  label: "Saratoga upgrade",    file: "Saratoga upgrade_5.html",      num: 5 },
  { group: "saratoga", badge: "SA", color: "amber",  label: "Saratoga upgrade",    file: "Saratoga upgrade_6.html",      num: 6 },
  { group: "tivian",   badge: "TX", color: "coral",  label: "Tivian DXI dashboard",file: "Tivian DXI _dashboard_1.html", num: 1 },
  { group: "tivian",   badge: "TX", color: "coral",  label: "Tivian DXI dashboard",file: "Tivian DXI _dashboard_2.html", num: 2 },
];

function card(e) {
  return `<a class="email-card" href="${e.file}">
    <div class="card-left">
      <div class="badge badge-${e.color}">${e.badge}</div>
      <div>
        <div class="email-name">${e.label} &mdash; ${e.num}</div>
        <div class="email-file">${e.file}</div>
      </div>
    </div>
    <span class="arrow">&#8594;</span>
  </a>`;
}

["acrm","pivotal","saratoga","tivian"].forEach(g => {
  document.getElementById("group-" + g).innerHTML =
    emails.filter(e => e.group === g).map(card).join("");
});

document.getElementById("count").textContent =
  emails.length + " emails across 4 series";
</script>
</body>
</html>
