<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Archive</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f4f0;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 3rem 1.5rem;
  }
  .container { max-width: 680px; margin: 0 auto; }
  header { margin-bottom: 2.5rem; }
  header h1 {
    font-size: 22px;
    font-weight: 500;
    color: #1a1a1a;
    margin-bottom: 6px;
  }
  header p {
    font-size: 14px;
    color: #888;
  }
  .list { display: flex; flex-direction: column; gap: 10px; }
  .email-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #ffffff;
    border: 0.5px solid rgba(0,0,0,0.1);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s, background 0.15s;
  }
  .email-card:hover {
    border-color: rgba(0,0,0,0.25);
    background: #fafaf9;
  }
  .email-card:hover .arrow { opacity: 1; }
  .card-left { display: flex; align-items: center; gap: 14px; }
  .icon {
    width: 36px; height: 36px;
    background: #eeedfe;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .icon svg { width: 18px; height: 18px; stroke: #534ab7; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
  .email-name {
    font-size: 15px;
    font-weight: 500;
    color: #1a1a1a;
  }
  .email-filename {
    font-size: 12px;
    color: #999;
    margin-top: 2px;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .arrow {
    opacity: 0.3;
    transition: opacity 0.15s;
    color: #888;
    font-size: 18px;
  }
  footer {
    margin-top: 2.5rem;
    font-size: 12px;
    color: #bbb;
    text-align: center;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Email archive</h1>
    <p>4 emails · click any to open</p>
  </header>
  <div class="list">
    <a class="email-card" href="ACRM_MCP_NonFAQ.html">
      <div class="card-left">
        <div class="icon">
          <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg>
        </div>
        <div>
          <div class="email-name">ACRM MCP NonFAQ</div>
          <div class="email-filename">ACRM_MCP_NonFAQ.html</div>
        </div>
      </div>
      <span class="arrow">→</span>
    </a>
    <a class="email-card" href="ACRM_MCP_NonFAQ_2.html">

        </div>
        <div>
          <div class="email-name">ACRM MCP NonFAQ 2</div>
          <div class="email-filename">ACRM_MCP_NonFAQ_2.html</div>
        </div>
      </div>
      <span class="arrow">→</span>
    </a>
    <a class="email-card" href="ACRM_MCP_NonFAQ_3.html">

        </div>
        <div>
          <div class="email-name">ACRM MCP NonFAQ 3</div>
          <div class="email-filename">ACRM_MCP_NonFAQ_3.html</div>
        </div>
      </div>
      <span class="arrow">→</span>
    </a>
    <a class="email-card" href="ACRM_MCP_NonFAQ_4.html">
      <div class="card-left">
        <div class="icon">
          <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg>

        <div>

        </div>
      </div>
      <span class="arrow">→</span>
    </a>
  </div>
  <footer>kanaekim / email-archive</footer>
</div>
</body>
</html>
